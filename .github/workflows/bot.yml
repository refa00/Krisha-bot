async def area_max_handler(update: Update, context: ContextTypes.DEFAULT_TYPE):
text = update.message.text.strip()
if text.lower() != 'пропустить':
try:
context.user_data['area_max'] = float(text)
except ValueError:
await update.message.reply_text(" return AREA_MAX
Введи число или напиши *пропустить*", parse_m
else:
